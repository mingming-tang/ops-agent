<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>运维 Agent 控制台</title>
<style>
  /* ===== light(默认)===== */
  :root {
    --bg: #f5f6f8; --fg: #1f2329; --header-bg: #ffffff; --nav-bg: #eef0f4;
    --input-bg: #ffffff; --border: #d7dbe2; --card-bg: #ffffff; --card-border: #e3e6ec;
    --nav-btn-bg: #e6e9ef; --nav-btn-fg: #41454c; --nav-btn-border: #d7dbe2;
    --pre-bg: #f0f2f5; --pre-border: #e0e3e9; --muted: #8a909a;
    --primary: #2d6cdf; --danger: #c0392b; --ghost: #e6e9ef; --ghost-fg: #41454c;
    --msg-user: #dfe9ff; --msg-bot: #e3f5e8; --approval-bg: #fff5e0; --approval-border: #e6c772;
    --readonly: #d8f0e0; --mutating: #f3eccf; --dangerous: #f6dada;
    --pill-fg: #2a2f36;
    /* shell 语法高亮(浅色) */
    --sh-cmd: #0b6e4f; --sh-flag: #1d4ed8; --sh-str: #b45309; --sh-var: #7c3aed; --sh-op: #be123c; --sh-cmt: #6b7280;
  }
  /* ===== dark ===== */
  [data-theme="dark"] {
    --bg: #0f1115; --fg: #e6e6e6; --header-bg: #161a22; --nav-bg: #12151c;
    --input-bg: #0f1115; --border: #333; --card-bg: #161a22; --card-border: #262b36;
    --nav-btn-bg: #1b2030; --nav-btn-fg: #ccc; --nav-btn-border: #2a3142;
    --pre-bg: #0c0e12; --pre-border: #222; --muted: #888;
    --primary: #2d6cdf; --danger: #c0392b; --ghost: #2a3142; --ghost-fg: #e6e6e6;
    --msg-user: #1d2740; --msg-bot: #16201a; --approval-bg: #3a2a12; --approval-border: #6b4f1d;
    --readonly: #1f3a2a; --mutating: #3a341f; --dangerous: #3a1f1f;
    --pill-fg: #e6e6e6;
    /* shell 语法高亮(深色) */
    --sh-cmd: #4ec9b0; --sh-flag: #569cd6; --sh-str: #ce9178; --sh-var: #dcdcaa; --sh-op: #f07178; --sh-cmt: #6a9955;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; margin: 0; background: var(--bg); color: var(--fg); }
  header { padding: 12px 20px; background: var(--header-bg); display: flex; gap: 16px; align-items: center; border-bottom: 1px solid var(--card-border); }
  header input { background: var(--input-bg); border: 1px solid var(--border); color: var(--fg); padding: 6px 10px; border-radius: 6px; }
  nav { display: flex; gap: 6px; padding: 10px 20px; background: var(--nav-bg); }
  nav button { background: var(--nav-btn-bg); color: var(--nav-btn-fg); border: 1px solid var(--nav-btn-border); padding: 6px 14px; border-radius: 6px; cursor: pointer; }
  nav button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  /* 网页越宽,内容区越宽(对话/终端随之变宽);下限为原来的 1000px,上限 1760px */
  main { padding: 20px; max-width: clamp(1000px, 92vw, 1760px); margin: 0 auto; }
  .panel { display: none; } .panel.active { display: block; }
  textarea, input, select { width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--fg); padding: 8px; border-radius: 6px; margin: 4px 0; font-family: inherit; }
  .btn { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
  .btn.danger { background: var(--danger); } .btn.ghost { background: var(--ghost); color: var(--ghost-fg); }
  .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  pre { white-space: pre-wrap; background: var(--pre-bg); padding: 10px; border-radius: 8px; border: 1px solid var(--pre-border); }
  .msg { margin: 8px 0; padding: 10px 12px; border-radius: 8px; }
  .msg .body { white-space: pre-wrap; margin-top: 4px; }
  #messages { }
  .msg.user { background: var(--msg-user); } .msg.bot { background: var(--msg-bot); }
  .approval { background: var(--approval-bg); border: 1px solid var(--approval-border); padding: 12px; border-radius: 8px; margin: 10px 0; }
  table { width: 100%; border-collapse: collapse; } td, th { border-bottom: 1px solid var(--card-border); padding: 6px; text-align: left; font-size: 13px; }
  .pill { padding: 2px 8px; border-radius: 10px; font-size: 12px; color: var(--pill-fg); }
  .readonly { background: var(--readonly);} .mutating{background: var(--mutating);} .dangerous{background: var(--dangerous);}
  small { color: var(--muted); }
  #themeToggle { margin-left: auto; }
  /* 对话两栏布局 */
  .chatLayout { display: grid; grid-template-columns: 240px 1fr; gap: 14px; align-items: start; }
  .convCol { min-width: 0; }   /* 会话 + 终端竖向堆叠,宽度收敛防止 xterm 撑破 */
  .histPane { position: sticky; top: 12px; }
  .histList-item { position: relative; padding: 8px 28px 8px 10px; margin-top: 6px; border: 1px solid var(--card-border); border-radius: 8px; background: var(--card-bg); cursor: pointer; font-size: 13px; overflow: hidden; }
  .histList-item.active { border-color: var(--primary); }
  .histList-item .x { position: absolute; top: 7px; right: 9px; color: var(--muted); cursor: pointer; }
  .histTitle { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; overflow-wrap: anywhere; }
  /* 会话卡:撑满可视高度(分辨率越高越大),消息区滚动、回复区固定在底部始终可见 */
  .convPane { display: flex; flex-direction: column; height: calc(100vh - 140px); min-height: 60vh; }
  .convScroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; }
  .convFooter { flex: 0 0 auto; padding-top: 6px; }
  #approvalBox { max-height: 38vh; overflow-y: auto; }
  /* 流式工具块 */
  .toolblk { border-left: 3px solid var(--primary); padding: 6px 10px; margin: 6px 0; background: var(--pre-bg); border-radius: 0 8px 8px 0; font-size: 13px; }
  .toolblk.skipped { border-left-color: var(--muted); opacity: .7; }
  .cursor::after { content: '▋'; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .op { margin: 8px 0; display: flex; flex-direction: column; gap: 4px; }
  .opRow { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .op code { flex: 1; word-break: break-all; }
  .op .opWhere { color: var(--muted); margin-right: 6px; }
  .opIntent { color: var(--muted); font-size: 12px; padding-left: 2px; }
  /* shell 语法高亮 token */
  .sh-cmd { color: var(--sh-cmd); font-weight: 600; }
  .sh-flag { color: var(--sh-flag); }
  .sh-str { color: var(--sh-str); }
  .sh-var { color: var(--sh-var); }
  .sh-op { color: var(--sh-op); }
  .sh-cmt { color: var(--sh-cmt); font-style: italic; }
  /* 操作对象选择栏 */
  .targetBar { display: flex; flex-direction: column; gap: 6px; font-size: 13px; padding: 8px 0; border-top: 1px dashed var(--card-border); margin-top: 8px; }
  .targetRow { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .targetBar .tlabel { color: var(--muted); }
  .targetBar label { display: inline-flex; align-items: center; gap: 3px; margin-right: 8px; }
  #serverChecks label, #cloudChecks label { background: var(--pre-bg); padding: 2px 8px; border-radius: 10px; }
  /* 调试面板 */
  .dbg { margin: 6px 0; border: 1px solid var(--card-border); border-radius: 8px; padding: 6px 10px; background: var(--pre-bg); font-size: 12px; }
  .dbg summary { cursor: pointer; color: var(--muted); }
  .dbgmsg b { color: var(--primary); }
  .dbgtok { color: var(--primary); font-size: 12px; margin: 4px 0; }
  /* 状态栏 */
  .statusBar { min-height: 22px; display: flex; align-items: center; gap: 8px; font-size: 13px; margin: 4px 0; }
  .statusBar.run { color: var(--primary); }
  .statusBar.wait { color: #b8860b; }
  .statusBar.done { color: #2e9e5b; }
  .statusBar.error { color: var(--danger); }
  .statusBar.interrupted { color: var(--muted); }
  .spin { width: 12px; height: 12px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; display: inline-block; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* 终端 */
  .termBar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  .termBar select { width: auto; min-width: 160px; }
  #termTabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0 0; }
  .termTab { padding: 5px 10px; border: 1px solid var(--card-border); border-bottom: none; border-radius: 8px 8px 0 0; background: var(--pre-bg); cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
  .termTab.active { border-color: var(--primary); background: #000; color: #eee; }
  .termTab .x { color: var(--muted); cursor: pointer; }
  .termTab.active .x { color: #bbb; }
  .termHint { color: var(--muted); font-size: 12px; padding: 6px 0; }
  .termPane { height: max(340px, 42vh); background: #000; border-radius: 0 8px 8px 8px; padding: 6px; overflow: hidden; }
  .termPane.light { background: #ffffff; }
  .termPane .xterm { height: 100%; }
  /* 终端全屏 */
  #terminalCard:fullscreen { background: var(--card-bg); padding: 14px; overflow: auto; }
  #terminalCard:fullscreen .termPane { height: calc(100vh - 130px); }
  /* 登录遮罩 */
  #loginOverlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 2000; display: none; align-items: center; justify-content: center; }
  #loginOverlay .card { width: 320px; }
  #loginErr { color: var(--danger); font-size: 13px; min-height: 18px; }
  /* ===== 手机端适配 ===== */
  @media (max-width: 768px) {
    header { padding: 10px 12px; gap: 8px; flex-wrap: wrap; }
    header strong { font-size: 15px; }
    nav { padding: 8px 10px; flex-wrap: wrap; }
    nav button { padding: 6px 10px; font-size: 13px; }
    main { padding: 12px; }
    /* 两栏改单栏:历史在上(可滚动)、会话在下 */
    .chatLayout { grid-template-columns: 1fr; gap: 10px; }
    .histPane { position: static; }
    #histList { max-height: 30vh; overflow-y: auto; }
    /* 手机上不固定高度,改回随内容流动;消息区限高滚动 */
    .convPane { height: auto; min-height: 0; }
    .convScroll { max-height: 55vh; }
    .row { grid-template-columns: 1fr; }
    .termPane { height: 300px; }
    .termBar select { min-width: 0; flex: 1 1 120px; }
    /* 16px 以上避免 iOS 聚焦时自动放大 */
    textarea, input, select { font-size: 16px; }
  }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
</head>
<body>
<div id="loginOverlay">
  <div class="card">
    <h3>登录控制台</h3>
    <input id="loginUser" placeholder="用户名"/>
    <input id="loginPass" type="password" placeholder="密码"/>
    <div id="loginErr"></div>
    <button class="btn" style="width:100%" onclick="doLogin()">登录</button>
  </div>
</div>
<header>
  <strong>🛠️ 运维 Agent 控制台</strong>
  <button id="themeToggle" class="btn ghost" onclick="toggleTheme()">🌙 深色</button>
  <button id="logoutBtn" class="btn ghost" onclick="doLogout()" style="display:none">退出</button>
</header>
<nav>
  <button data-tab="chat" class="active">对话</button>
  <button data-tab="models">模型</button>
  <button data-tab="servers">服务器</button>
  <button data-tab="sshkeys">SSH秘钥</button>
  <button data-tab="clouds" style="display:none">云账号(MCP)</button>
  <button data-tab="audits">审计</button>
</nav>
<main>
  <!-- 对话 -->
  <section class="panel active" id="chat">
    <div class="chatLayout">
      <aside class="histPane">
        <button class="btn" style="width:100%" onclick="newThread()">+ 新会话</button>
        <div id="histList"></div>
      </aside>
      <div class="convCol">
      <div class="card convPane">
        <div class="convScroll">
          <div id="messages"></div>
          <div id="debugPane"></div>
        </div>
        <div class="convFooter">
        <div id="approvalBox"></div>
        <div class="targetBar">
          <div class="targetRow">
            <span class="tlabel">操作对象<small>(不选=全部)</small>:</span>
            <span class="tgroup">🖥️ 服务器 <span id="serverChecks"></span></span>
          </div>
          <div class="targetRow" style="display:none">
            <span class="tgroup">☁️ 云账号 <span id="cloudChecks"></span></span>
          </div>
          <div class="targetRow">
            <label><input type="checkbox" id="autoApproveAll" style="width:auto"/> ⚡ 本会话所有命令无需确认</label>
            <label><input type="checkbox" id="dbgToggle" style="width:auto"/> 🐞 显示模型请求/返回</label>
          </div>
        </div>
        <div class="statusBar" id="statusBar"></div>
        <textarea id="input" rows="3" placeholder="例:检查 web-prod-1 的磁盘使用率,>80% 的分区列出最大的5个目录(⌘/Ctrl+Enter 发送)"></textarea>
        <button class="btn" id="sendBtn" onclick="send()">发送 (⌘↵)</button>
        <button class="btn danger" id="abortBtn" onclick="abortRun()" style="display:none">⏹ 中断</button>
        <button class="btn ghost" id="endBtn" onclick="endTask()">结束任务</button>
        <small id="threadLabel"></small>
        </div>
      </div>
      <div class="card" id="terminalCard">
        <div class="termBar">
          <b>🖥️ 终端</b>
          <select id="termServer"><option value="">选择服务器…</option></select>
          <button class="btn" onclick="openTerminal()">+ 新建终端</button>
          <button class="btn ghost" id="termThemeBtn" onclick="toggleTermTheme()">☀️ 浅色</button>
          <button class="btn ghost" onclick="toggleTermFullscreen()">⛶ 全屏</button>
          <small>可同时连多台,点 Tab 切换</small>
        </div>
        <div id="termTabs"></div>
        <div id="termPanes"></div>
      </div>
      </div>
    </div>
  </section>

  <!-- 模型 -->
  <section class="panel" id="models">
    <div class="card">
      <h3>新增模型供应商</h3>
      <div class="row">
        <input id="m_name" placeholder="名称 如 opus"/>
        <select id="m_type"><option>openai</option><option>anthropic</option><option>qwen</option><option>minimax</option><option>deepseek</option></select>
        <input id="m_model" placeholder="model 如 claude-opus-4-8 / qwen-max"/>
        <input id="m_key" placeholder="API Key"/>
        <input id="m_base" placeholder="base_url(可空,用默认)"/>
        <label><input type="checkbox" id="m_default" style="width:auto"/> 设为默认</label>
      </div>
      <button class="btn" onclick="addModel()">保存</button>
    </div>
    <div id="modelList"></div>
  </section>

  <!-- 服务器 -->
  <section class="panel" id="servers">
    <div class="card">
      <h3 id="s_formTitle">新增服务器</h3>
      <div class="row">
        <input id="s_name" placeholder="名称 如 web-prod-1"/>
        <input id="s_host" placeholder="host/IP"/>
        <input id="s_port" placeholder="端口 22" value="22"/>
        <input id="s_user" placeholder="用户名"/>
        <select id="s_auth" onchange="onAuthChange()"><option value="password">密码</option><option value="key">私钥</option></select>
        <input id="s_pass" placeholder="密码"/>
      </div>
      <select id="s_key_sel" style="display:none"><option value="">— 选择已保存的秘钥(或在下方粘贴)—</option></select>
      <textarea id="s_key" rows="2" placeholder="私钥(auth=key 且未选已保存秘钥时填)"></textarea>
      <input id="s_tags" placeholder="标签,逗号分隔 如 prod,web"/>
      <input id="s_desc" placeholder="描述(可选)"/>
      <button class="btn" id="s_saveBtn" onclick="saveServer()">保存</button>
      <button class="btn ghost" id="s_cancelBtn" onclick="resetServerForm()" style="display:none">取消编辑</button>
      <small id="s_editHint" style="display:none"> · 编辑中,密码/私钥留空表示保持不变</small>
    </div>
    <div id="serverList"></div>
  </section>

  <!-- SSH 秘钥 -->
  <section class="panel" id="sshkeys">
    <div class="card">
      <h3>新增 SSH 秘钥</h3>
      <input id="k_name" placeholder="名称 如 prod-deploy"/>
      <textarea id="k_key" rows="4" placeholder="私钥内容(-----BEGIN ... -----END ...)"></textarea>
      <div class="row">
        <input id="k_pass" placeholder="passphrase(可空)"/>
        <input id="k_desc" placeholder="描述(可选)"/>
      </div>
      <button class="btn" onclick="addSSHKey()">保存秘钥</button>
      <small> · 保存后可在"服务器"表单里直接选用,无需重复粘贴私钥</small>
    </div>
    <div id="sshKeyList"></div>
  </section>

  <!-- 云账号 -->
  <section class="panel" id="clouds">
    <div class="card">
      <h3 id="c_formTitle">新增云账号(MCP)</h3>
      <div class="row">
        <input id="c_name" placeholder="名称 如 aliyun-prod"/>
        <select id="c_type"><option>aliyun</option><option>cloudflare</option></select>
        <select id="c_transport"><option>stdio</option><option>streamable_http</option></select>
        <input id="c_cmd" placeholder="command(stdio) 如 npx"/>
        <input id="c_args" placeholder="args 逗号分隔 如 -y,@alicloud/alibabacloud-mcp-server"/>
        <input id="c_url" placeholder="url(http 方式)"/>
      </div>
      <label><input type="checkbox" id="c_enabled" style="width:auto" checked/> 启用</label>
      <textarea id="c_secrets" rows="3" placeholder='认证信息 JSON,如 {"ALIBABA_CLOUD_ACCESS_KEY_ID":"xxx","ALIBABA_CLOUD_ACCESS_KEY_SECRET":"yyy"}'></textarea>
      <button class="btn" id="c_saveBtn" onclick="saveCloud()">保存</button>
      <button class="btn ghost" id="c_cancelBtn" onclick="resetCloudForm()" style="display:none">取消编辑</button>
      <small id="c_editHint" style="display:none"> · 编辑中,认证 JSON 留空表示保持不变</small>
    </div>
    <div id="cloudList"></div>
  </section>

  <!-- 审计 -->
  <section class="panel" id="audits">
    <div class="card"><button class="btn ghost" onclick="loadAudits()">刷新</button><div id="auditList"></div></div>
  </section>
</main>

<script>
const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ---- 主题(默认 light,记忆到 localStorage)----
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  const btn=$('themeToggle'); if(btn) btn.textContent = t==='dark' ? '☀️ 浅色' : '🌙 深色';
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'light';
  const next = cur==='dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next); applyTheme(next);
}
applyTheme(localStorage.getItem('theme') || 'light');

let threadId = null;
async function api(path, method='GET', body){
  const r = await fetch(path, {method, headers:{'Content-Type':'application/json'}, body: body?JSON.stringify(body):undefined});
  if(r.status===401){ showLogin(); throw new Error(401); }
  if(!r.ok){ let m=await r.text(); try{ m=JSON.parse(m).detail||m; }catch(e){} alert('请求失败 '+r.status+': '+m); throw new Error(r.status); }
  return r.json();
}

// ---- 登录认证(单用户)----
function showLogin(){ $('loginOverlay').style.display='flex'; setTimeout(()=>$('loginUser').focus(),50); }
async function checkAuth(){
  let j={authenticated:true, auth_enabled:false};
  try{ j=await (await fetch('/auth/me')).json(); }catch(e){}
  if(j.auth_enabled) $('logoutBtn').style.display='';
  if(j.auth_enabled && !j.authenticated){ showLogin(); return false; }
  return true;
}
async function doLogin(){
  $('loginErr').textContent='';
  const r=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:$('loginUser').value, password:$('loginPass').value})});
  if(r.ok) location.reload();
  else $('loginErr').textContent='用户名或密码错误';
}
async function doLogout(){ try{ await fetch('/auth/logout',{method:'POST'}); }catch(e){} location.reload(); }
// tabs
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); $(b.dataset.tab).classList.add('active');
  if(b.dataset.tab==='chat'){ loadConversations(); loadTargets(); }
  if(b.dataset.tab==='models') loadModels();
  if(b.dataset.tab==='servers'){ loadServers(); loadKeyOptions(); }
  if(b.dataset.tab==='sshkeys') loadSSHKeys();
  if(b.dataset.tab==='clouds') loadClouds();
  if(b.dataset.tab==='audits') loadAudits();
});

// ---- 对话(流式)----
const LV={readonly:'只读',mutating:'变更',dangerous:'危险'};
function el(html){ const d=document.createElement('div'); d.innerHTML=html; return d.firstElementChild; }
function scroll(){ const m=document.querySelector('.convScroll'); if(m) m.scrollTop=m.scrollHeight; }
// ssh/工具执行结果默认折叠(点击展开)
function toolResultHtml(name, output, skip){
  return `<details class="toolblk ${skip?'skipped':''}"><summary>↳ 结果 <small>${esc(name||'')}</small>${skip?' <small>(已跳过)</small>':''}</summary><pre>${esc(output||'')}</pre></details>`;
}
// shell 语法高亮:把命令按 命令名/参数/选项/字符串/变量/操作符/注释 上色(输出已转义,安全)
function shellHighlight(src){
  const RE=/(\s+)|("(?:\\.|[^"\\])*"|'[^']*')|(\$\{[^}]*\}|\$[\w@*#?$!-]+)|(\|\||&&|>>|2>&1|[|&;()<>])|(#[^\n]*)|([A-Za-z0-9_./+:@%=,~^-]+)|(.)/g;
  let out='', m, expectCmd=true;
  while((m=RE.exec(src))){
    const ws=m[1], str=m[2], v=m[3], op=m[4], cmt=m[5], word=m[6], other=m[7];
    if(ws){ out+=esc(ws); }
    else if(str){ out+=`<span class="sh-str">${esc(str)}</span>`; }
    else if(v){ out+=`<span class="sh-var">${esc(v)}</span>`; }
    else if(op){ out+=`<span class="sh-op">${esc(op)}</span>`; if(/^(\|\||&&|[|;&()])$/.test(op)) expectCmd=true; }
    else if(cmt){ out+=`<span class="sh-cmt">${esc(cmt)}</span>`; }
    else if(word){
      let cls;
      if(/^--?[A-Za-z0-9?]/.test(word)) cls='sh-flag';
      else if(expectCmd && /^[A-Za-z_]\w*=/.test(word)) cls='sh-arg';        // 赋值,命令在其后
      else if(expectCmd){ cls='sh-cmd'; expectCmd=false; }
      else cls='sh-arg';
      out+=`<span class="${cls}">${esc(word)}</span>`;
    }
    else if(other!==undefined){ out+=esc(other); }
  }
  return out;
}
// ---- 多会话:每个会话独立的视图(消息/调试/审批/状态/流),互不干扰、可并行运行 ----
let threads={};        // tid -> view
let activeView=null;   // 当前展示的会话视图(新会话拿到 tid 前其 tid 为 null)
function makeView(tid){
  return { tid, msgs:document.createElement('div'), dbg:document.createElement('div'),
           approvalHtml:'', clarifyOpts:[], ctx:{bot:null},
           status:{text:'',kind:''}, busy:false, abort:null, dbgCount:0, ended:false,
           tokIn:0, tokOut:0 };
}
// 工具调用块(命令 + shell 高亮),实时与历史共用,保证历史也能看到"执行了什么"
function toolCallBlock(name, args, level){
  const lv=level||''; const isCmd=!!(args&&args.command); const cmd=(args&&args.command)||name;
  const intent=(args&&args.intent)||''; const cmdHtml=isCmd?shellHighlight(cmd):esc(cmd);
  return el(`<div class="toolblk">▶ 调用 <b>${esc(name)}</b> <span class="pill ${lv}">${LV[lv]||lv}</span>${intent?'<br><small>📝 '+esc(intent)+'</small>':''}<br><code>${cmdHtml}</code></div>`);
}
function isActive(v){ return v===activeView; }
function highlightHist(){ document.querySelectorAll('.histList-item').forEach(x=>x.classList.toggle('active', x.dataset.tid===threadId)); }
function applyStatus(st){ const s=$('statusBar'); if(!st||!st.text){ s.className='statusBar'; s.innerHTML=''; return; }
  s.className='statusBar '+(st.kind||''); s.innerHTML=(st.kind==='run'?'<span class="spin"></span>':'')+'<span>'+esc(st.text)+'</span>'; }
function vStatus(v, text, kind){ v.status={text,kind}; if(isActive(v)) applyStatus(v.status); }
function vScroll(v){ if(isActive(v)) scroll(); }
function vAddMsg(v, role, text){ const d=document.createElement('div'); d.className='msg '+(role==='user'?'user':'bot');
  d.innerHTML='<b>'+(role==='user'?'你':'Agent')+'</b><div class="body"></div>'; d.querySelector('.body').textContent=text||'';
  v.msgs.appendChild(d); vScroll(v); return d.querySelector('.body'); }
function vAppend(v, node){ v.msgs.appendChild(node); vScroll(v); }
// 把某个会话视图挂到可见区域(切换会话只换显示,后台会话的流照常在各自视图里跑)
function mountView(v){
  activeView=v; threadId=v?v.tid:null;
  const m=$('messages'); m.innerHTML=''; if(v) m.appendChild(v.msgs);
  const d=$('debugPane'); d.innerHTML=''; if(v) d.appendChild(v.dbg);
  $('approvalBox').innerHTML = v?v.approvalHtml:''; clarifyOpts = v?v.clarifyOpts:[];
  applyStatus(v?v.status:{text:'',kind:''}); setBusy(v?v.busy:false);
  $('threadLabel').textContent = (v&&v.tid)?('thread: '+v.tid):'新会话';
  if(v&&v.tid) localStorage.setItem('threadId',v.tid); else localStorage.removeItem('threadId');
  highlightHist(); scroll();
}
function newThread(){ mountView(makeView(null)); }
function setBusy(b){ $('sendBtn').disabled=b; $('input').disabled=b; $('abortBtn').style.display=b?'inline-block':'none'; }
// 统一发起一个会话的流式请求(带 per-view 的中断与忙碌状态)
async function startStream(v, path, body){
  v.busy=true; if(isActive(v)) setBusy(true); vStatus(v,'模型回复中…','run');
  v.abort=new AbortController();
  try{ await streamPost(path, body, ev=>handleEvent(ev,v), v.abort.signal); }
  finally{ v.abort=null; v.busy=false; if(isActive(v)) setBusy(false); loadConversations(); }
}

function abortRun(){ const v=activeView; if(v&&v.abort){ v.abort.abort(); v.abort=null; } if(v){ v.busy=false; vStatus(v,'已中断','interrupted'); } setBusy(false); }
async function endTask(){
  const v=activeView;
  if(v&&v.abort){ v.abort.abort(); v.abort=null; }
  if(v) v.busy=false; setBusy(false);
  const tid=v&&v.tid;
  if(tid){ try{ await api('/chat/conversations/'+tid+'/end','POST'); }catch(e){} delete threads[tid]; }
  loadConversations(); newThread();
}

// 把一个 SSE 事件渲染到对应会话视图 v(后台会话写入各自的 detached DOM,互不干扰)
function handleEvent(ev, v){
  if(ev.type==='thread'){ v.tid=ev.thread_id; threads[v.tid]=v;
      if(isActive(v)){ threadId=v.tid; localStorage.setItem('threadId',v.tid); $('threadLabel').textContent='thread: '+v.tid; }
      loadConversations(); }
  else if(ev.type==='token'){ if(!v.ctx.bot){ v.ctx.bot=vAddMsg(v,'bot',''); v.ctx.bot.classList.add('cursor'); } v.ctx.bot.textContent+=ev.text; vStatus(v,'模型回复中…','run'); vScroll(v); }
  else if(ev.type==='tool_call'){ vStatus(v,'指令执行中…','run'); vAppend(v, toolCallBlock(ev.name, ev.args, ev.level)); }
  else if(ev.type==='tool_result'){ const skip=(ev.output||'').startsWith('[已跳过]'); vStatus(v,'处理执行结果…','run');
      vAppend(v, el(toolResultHtml(ev.name, ev.output, skip))); }
  else if(ev.type==='llm_io'){ const u=ev.usage||{}; v.tokIn+=(u.input||0); v.tokOut+=(u.output||0); if($('dbgToggle').checked) renderLlmIo(v, ev); }
  else if(ev.type==='approval_required'){ if(v.ctx.bot){ v.ctx.bot.classList.remove('cursor'); v.ctx.bot=null; } vStatus(v,'等待确认','wait'); renderApproval(v, ev); }
  else if(ev.type==='clarify_required'){ if(v.ctx.bot){ v.ctx.bot.classList.remove('cursor'); v.ctx.bot=null; } vStatus(v,'等待澄清','wait'); renderClarify(v, ev); }
  else if(ev.type==='done'){ if(v.ctx.bot){ v.ctx.bot.classList.remove('cursor'); v.ctx.bot=null; } vStatus(v,'已完成','done'); }
  else if(ev.type==='error'){ vAddMsg(v,'bot','⚠️ 出错:'+ev.error); vStatus(v,'出错','error'); }
}

function renderApproval(v, a){
  const ops=a.operations||[];
  let h='<div class="approval"><b>⚠️ 以下命令需确认后执行</b>';
  ops.forEach(op=>{ const lv=op.level||'';
    // 第一行:级别 + 命令(shell 高亮);第二行:命令解释
    const server=op.args&&op.args.server_name;
    const cmdHtml = op.command ? ((server?`<span class="opWhere">[${esc(server)}]</span>`:'')+shellHighlight(op.command)) : esc(op.summary);
    h+=`<div class="op">
          <div class="opRow"><span class="pill ${lv}">${LV[lv]||lv}</span><code>${cmdHtml}</code>
            <button class="btn" onclick="approve('selected',['${op.id}'],false)">执行此条</button></div>
          ${op.intent?`<div class="opIntent">📝 ${esc(op.intent)}</div>`:''}
        </div>`; });
  h+=`<div style="margin-top:8px">
        <button class="btn" onclick="approve('all',[],false)">全部执行</button>
        <button class="btn" onclick="approve('all',[],true)">全部执行并下次不再确认</button>
        <button class="btn danger" onclick="approve('reject',[],false)">全部拒绝</button>
      </div></div>`;
  v.approvalHtml=h; v.clarifyOpts=[]; if(isActive(v)){ $('approvalBox').innerHTML=h; clarifyOpts=[]; }
}

// clarify:模型在任务不明确时发起的提问,展示选项让用户选(也可自行补充)
let clarifyOpts=[];
function renderClarify(v, c){
  const opts = c.options||[];
  let h='<div class="approval"><b>❓ 需要你确认一下</b><div style="margin:6px 0">'+esc(c.question||'')+'</div>';
  opts.forEach((o,i)=>{ h+=`<button class="btn" style="margin:3px" onclick="clarifyAnswer(clarifyOpts[${i}])">${esc(o)}</button>`; });
  h+=`<div style="margin-top:8px"><input id="clarifyText" placeholder="或自行补充…" style="width:70%;display:inline-block"/>
      <button class="btn ghost" onclick="clarifyAnswer($('clarifyText').value)">提交</button></div></div>`;
  v.approvalHtml=h; v.clarifyOpts=opts; if(isActive(v)){ $('approvalBox').innerHTML=h; clarifyOpts=opts; }
}
async function clarifyAnswer(answer){
  const v=activeView; if(!v) return;
  v.approvalHtml=''; $('approvalBox').innerHTML='';
  startStream(v, '/chat/clarify', {thread_id:v.tid, answer:answer||'',
        auto_approve_all:$('autoApproveAll').checked,
        servers:selectedServers(), clouds:selectedClouds()});
}

// 通用 SSE(POST + 流式读取,支持 AbortSignal 中断)
async function streamPost(path, body, onEvent, signal){
  let r;
  try{ r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal}); }
  catch(e){ if(e.name!=='AbortError') onEvent({type:'error',error:String(e)}); return; }
  if(r.status===401){ showLogin(); onEvent({type:'error',error:'未登录,请重新登录'}); return; }
  if(!r.ok){ onEvent({type:'error',error:'HTTP '+r.status+' '+await r.text()}); return; }
  const reader=r.body.getReader(), dec=new TextDecoder(); let buf='';
  try{
    while(true){ const {value,done}=await reader.read(); if(done) break; buf+=dec.decode(value,{stream:true});
      let i; while((i=buf.indexOf('\n\n'))>=0){ const line=buf.slice(0,i); buf=buf.slice(i+2);
        if(line.startsWith('data: ')){ try{ onEvent(JSON.parse(line.slice(6))); }catch(e){} } } }
  }catch(e){ if(e.name!=='AbortError') onEvent({type:'error',error:String(e)}); }
}

async function send(){
  const msg=$('input').value.trim(); if(!msg) return;
  let v=activeView;
  if(!v || v.ended){ v=makeView(null); mountView(v); }   // 没有活动会话(或已结束)则开新会话
  if(v.busy) return;                                      // 当前会话正在运行,先切到别的或新建
  vAddMsg(v,'user',msg); $('input').value='';
  startStream(v, '/chat/stream', {message:msg, thread_id:v.tid,
        servers:selectedServers(), clouds:selectedClouds(),
        auto_approve_all:$('autoApproveAll').checked});
}
async function approve(action, ids, remember){
  const v=activeView; if(!v) return;
  remember = action!=='reject' && !!remember;
  v.approvalHtml=''; $('approvalBox').innerHTML='';   // handleEvent 按需重渲染审批框
  startStream(v, '/chat/approve', {thread_id:v.tid, action, ids, remember,
        auto_approve_all:$('autoApproveAll').checked,
        servers:selectedServers(), clouds:selectedClouds()});
}

// ---- 操作对象选择 ----
async function loadTargets(){
  const [svs, cls] = await Promise.all([api('/admin/servers'), api('/admin/cloud-accounts')]);
  $('serverChecks').innerHTML = svs.length
    ? svs.map(s=>`<label><input type="checkbox" class="svchk" value="${esc(s.name)}" style="width:auto"/>${esc(s.name)}</label>`).join('')
    : '<small>无</small>';
  $('cloudChecks').innerHTML = cls.filter(c=>c.enabled).length
    ? cls.filter(c=>c.enabled).map(c=>`<label><input type="checkbox" class="clchk" value="${esc(c.name)}" style="width:auto"/>${esc(c.name)}</label>`).join('')
    : '<small>无</small>';
  // 终端服务器下拉(沿用已登记服务器)
  const cur=$('termServer').value;
  $('termServer').innerHTML = '<option value="">选择服务器…</option>'
    + svs.map(s=>`<option value="${esc(s.name)}">${esc(s.name)} (${esc(s.username)}@${esc(s.host)})</option>`).join('');
  $('termServer').value=cur;
}
const selectedServers = () => [...document.querySelectorAll('.svchk:checked')].map(x=>x.value);
const selectedClouds  = () => [...document.querySelectorAll('.clchk:checked')].map(x=>x.value);

// ---- 交互式终端(xterm.js + WebSocket,多 Tab,会话常驻可跨刷新)----
let termSessions={};      // sid -> {sid, server, term, fit, ws, status}
let activeTermId=null;
const TERM_DOT={connecting:'🟡', on:'🟢', err:'🔴', off:'⚪'};
// 终端主题(亮/暗),偏好记忆到 localStorage
const TERM_THEMES={
  dark:  {background:'#000000', foreground:'#e6e6e6', cursor:'#e6e6e6', selectionBackground:'#33467c'},
  light: {background:'#ffffff', foreground:'#1f2329', cursor:'#1f2329', selectionBackground:'#cfe3ff'},
};
let termTheme=localStorage.getItem('termTheme')||'dark';
function applyTermPaneStyle(pane){ pane.classList.toggle('light', termTheme==='light'); }
function termThemeLabel(){ return termTheme==='dark' ? '☀️ 浅色' : '🌙 深色'; }  // 显示"将切换到"的目标
function toggleTermTheme(){
  termTheme = termTheme==='dark' ? 'light' : 'dark';
  localStorage.setItem('termTheme', termTheme);
  $('termThemeBtn').textContent = termThemeLabel();
  Object.values(termSessions).forEach(s=>{ s.term.options.theme=TERM_THEMES[termTheme];
    const p=$('termPane_'+s.sid); if(p) applyTermPaneStyle(p); });
}
function toggleTermFullscreen(){
  const el=$('terminalCard');
  if(document.fullscreenElement) document.exitFullscreen?.();
  else el.requestFullscreen?.();
}
document.addEventListener('fullscreenchange', ()=>{ const s=termSessions[activeTermId];
  if(s) setTimeout(()=>{ try{ s.fit.fit(); sendTermResize(s); }catch(e){} }, 80); });

// 打开的终端会话(sid+server)记到 localStorage,刷新后据此恢复
function saveTermTabs(){
  localStorage.setItem('termTabs', JSON.stringify(Object.values(termSessions).map(s=>({sid:s.sid, server:s.server}))));
}
async function openTerminal(){
  const server=$('termServer').value;
  if(!server) return alert('请先选择服务器');
  if(typeof Terminal==='undefined') return alert('终端组件(xterm.js)未加载,请检查网络/CDN');
  let r; try{ r=await api('/chat/terminal/open?server='+encodeURIComponent(server),'POST'); }catch(e){ return; }
  buildTermTab(r.session_id, server, true); saveTermTabs();
}
// 创建一个终端 Tab 并连上服务端会话(新建或刷新恢复都走这里)
function buildTermTab(sid, server, focus){
  if(termSessions[sid]){ activateTerm(sid); return; }
  const pane=document.createElement('div'); pane.className='termPane'; pane.id='termPane_'+sid;
  applyTermPaneStyle(pane); $('termPanes').appendChild(pane);
  const term=new Terminal({cursorBlink:true, fontSize:13, fontFamily:'Menlo, Consolas, monospace', theme:TERM_THEMES[termTheme]});
  const fit=new FitAddon.FitAddon(); term.loadAddon(fit); term.open(pane);
  const sess={sid, server, term, fit, ws:null, status:'connecting'};
  termSessions[sid]=sess;
  term.onData(d=>{ if(sess.ws&&sess.ws.readyState===1) sess.ws.send(JSON.stringify({type:'input',data:d})); });
  term.onResize(()=>sendTermResize(sess));
  if(focus) activateTerm(sid);
  connectTermWs(sess);
  renderTermTabs();
}
function connectTermWs(sess){
  const proto=location.protocol==='https:'?'wss':'ws';
  const ws=new WebSocket(`${proto}://${location.host}/chat/terminal?session=${encodeURIComponent(sess.sid)}`);
  ws.binaryType='arraybuffer'; sess.ws=ws;
  ws.onmessage=ev=>{
    if(typeof ev.data==='string'){ const m=JSON.parse(ev.data);
      if(m.type==='ready'){ sess.status='on'; renderTermTabs(); sendTermResize(sess); }
      else if(m.type==='error'){ sess.term.write('\r\n\x1b[31m[错误] '+m.error+'\x1b[0m\r\n'); sess.status='err'; renderTermTabs(); }
      else if(m.type==='exit'){ sess.term.write('\r\n\x1b[33m[会话已结束]\x1b[0m\r\n'); sess.status='off'; renderTermTabs(); }
    } else sess.term.write(new Uint8Array(ev.data));
  };
  ws.onclose=()=>{ if(sess.status!=='err'&&sess.status!=='off') sess.status='off'; renderTermTabs(); };
  ws.onerror=()=>{ sess.status='err'; renderTermTabs(); };
}
function sendTermResize(sess){ if(sess&&sess.ws&&sess.ws.readyState===1)
  sess.ws.send(JSON.stringify({type:'resize',cols:sess.term.cols,rows:sess.term.rows})); }
function activateTerm(sid){
  activeTermId=sid;
  Object.values(termSessions).forEach(s=>{ const p=$('termPane_'+s.sid); if(p) p.style.display=(s.sid===sid?'block':'none'); });
  renderTermTabs();
  const s=termSessions[sid];
  if(s) setTimeout(()=>{ try{ s.fit.fit(); sendTermResize(s); s.term.focus(); }catch(e){} }, 30);
}
async function closeTerm(sid, ev){
  if(ev) ev.stopPropagation();
  const s=termSessions[sid]; if(!s) return;
  try{ s.ws&&s.ws.close(); }catch(e){}
  try{ s.term.dispose(); }catch(e){}
  const p=$('termPane_'+sid); if(p) p.remove();
  delete termSessions[sid];
  try{ await fetch('/chat/terminal/'+sid,{method:'DELETE'}); }catch(e){}   // 显式关闭则销毁服务端会话
  saveTermTabs();
  if(activeTermId===sid){ const rest=Object.keys(termSessions); activeTermId=rest.length?rest[rest.length-1]:null;
    if(activeTermId) activateTerm(activeTermId); }
  renderTermTabs();
}
function renderTermTabs(){
  const ids=Object.keys(termSessions);
  $('termTabs').innerHTML = ids.length
    ? ids.map(sid=>{ const s=termSessions[sid];
        return `<div class="termTab ${sid===activeTermId?'active':''}" onclick="activateTerm('${sid}')">${TERM_DOT[s.status]||'⚪'} ${esc(s.server)} <span class="x" onclick="closeTerm('${sid}',event)">✕</span></div>`;
      }).join('')
    : '<div class="termHint">还没有终端,选择服务器后点"+ 新建终端"</div>';
}
// 刷新后:只恢复服务端仍存活的会话(回放历史输出)
async function restoreTerminals(){
  let saved=[]; try{ saved=JSON.parse(localStorage.getItem('termTabs')||'[]'); }catch(e){}
  if(!saved.length || typeof Terminal==='undefined') return;
  let alive=[]; try{ alive=await api('/chat/terminal/sessions'); }catch(e){ return; }
  const aliveSet=new Set(alive.map(a=>a.id));
  const keep=saved.filter(t=>aliveSet.has(t.sid));
  keep.forEach((t,i)=>buildTermTab(t.sid, t.server, i===0));
  saveTermTabs();   // 清掉已失效的
}
window.addEventListener('resize', ()=>{ const s=termSessions[activeTermId]; if(s){ try{ s.fit.fit(); sendTermResize(s); }catch(e){} } });

// ---- 调试:模型请求/返回(写入对应会话视图)----
function renderLlmIo(v, ev){
  v.dbgCount++;
  const p=(ev.prompt||[]).map(m=>{
    let tc = m.tool_calls ? '<div><i>tool_calls:</i> '+esc(JSON.stringify(m.tool_calls))+'</div>' : '';
    return `<div class="dbgmsg"><b>${esc(m.role)}</b><pre>${esc(m.content||'')}</pre>${tc}</div>`;
  }).join('');
  const r=ev.response||{};
  const rtc = (r.tool_calls&&r.tool_calls.length) ? '<div><i>tool_calls:</i> '+esc(JSON.stringify(r.tool_calls))+'</div>' : '';
  const u=ev.usage||{}; const ti=u.input||0, to=u.output||0;
  const tok=`🎫 本次 输入 ${ti} / 输出 ${to} · 本会话累计 输入 ${v.tokIn} / 输出 ${v.tokOut}`;
  v.dbg.appendChild(el(
    `<details class="dbg"><summary>🐞 模型请求/返回 #${v.dbgCount}(prompt ${ (ev.prompt||[]).length } 条消息)</summary>
       <div class="dbgtok">${tok}</div>
       <b>▷ 发送给模型的 Prompt</b>${p}
       <b>◁ 模型返回</b><div class="dbgmsg"><pre>${esc(r.content||'(空,仅工具调用)')}</pre>${rtc}</div>
     </details>`));
  vScroll(v);
}

// ---- 历史记录 ----
async function loadConversations(){
  const l=await api('/chat/conversations');
  $('histList').innerHTML=l.map(c=>{ const run = threads[c.thread_id] && threads[c.thread_id].busy;
    return `<div class="histList-item ${c.thread_id===threadId?'active':''}" data-tid="${c.thread_id}" onclick="openConversation('${c.thread_id}')">
     <span class="x" onclick="event.stopPropagation();delConversation('${c.thread_id}')">✕</span>
     <div class="histTitle">${run?'⏳ ':''}${esc(c.title||'(无标题)')}</div><small>${c.status} · ${c.created_at.slice(5,16)}</small></div>`; }).join('');
}
async function openConversation(tid){
  // 已有活动视图(可能正在后台运行)直接切过去,保留其实时状态,不从服务端重载
  if(threads[tid]){ mountView(threads[tid]); loadConversations(); return; }
  const c=await api('/chat/conversations/'+tid);
  const v=makeView(tid); threads[tid]=v;
  c.messages.forEach(m=>{
    if(m.role==='tool_call'){ try{ const d=JSON.parse(m.content); v.msgs.appendChild(toolCallBlock(d.name, d.args, d.level)); }catch(e){} }
    else if(m.role==='tool'){ const skip=(m.content||'').startsWith('[已跳过]');
      v.msgs.appendChild(el(toolResultHtml(m.tool_name||'结果', m.content, skip))); }
    else vAddMsg(v, m.role==='user'?'user':'bot', m.content);
  });
  mountView(v); loadConversations();
}
async function delConversation(tid){
  if(!confirm('删除该会话历史?')) return;
  const v=threads[tid]; if(v){ if(v.abort){ v.abort.abort(); v.abort=null; } delete threads[tid]; }
  await api('/chat/conversations/'+tid,'DELETE');
  if(tid===threadId) newThread();
  loadConversations();
}
// 刷新后恢复上次打开的会话(消息在服务端,直接重新打开;已删除则清掉记忆)
async function restoreConversation(){
  const tid=localStorage.getItem('threadId'); if(!tid) return;
  try{ const r=await fetch('/chat/conversations/'+tid); if(!r.ok){ localStorage.removeItem('threadId'); return; } }
  catch(e){ return; }
  openConversation(tid);
}

// ---- 模型 ----
async function addModel(){
  await api('/admin/models','POST',{name:$('m_name').value, provider_type:$('m_type').value, model_name:$('m_model').value,
    api_key:$('m_key').value, base_url:$('m_base').value||null, is_default:$('m_default').checked});

async function loadModels(){ const l=await api('/admin/models'); $('modelList').innerHTML=l.map(m=>

// ---- 服务器 ----
let editingServerId = null;
function serverPayload(){
  return {name:$('s_name').value, host:$('s_host').value, port:+$('s_port').value||22,
    username:$('s_user').value, auth_type:$('s_auth').value, password:$('s_pass').value||null,
    private_key:$('s_key').value||null, description:$('s_desc').value||null,
    ssh_key_id: $('s_key_sel').value ? +$('s_key_sel').value : null,
    tags:$('s_tags').value.split(',').map(x=>x.trim()).filter(Boolean)};
}
// auth=key 时显示秘钥选择/粘贴框
function onAuthChange(){
  const isKey = $('s_auth').value==='key';
  $('s_key_sel').style.display = isKey ? '' : 'none';
  $('s_key').style.display = isKey ? '' : 'none';
  $('s_pass').style.display = isKey ? 'none' : '';
}
// 把已保存的 SSH 秘钥填进服务器表单的下拉
async function loadKeyOptions(){
  let keys=[]; try{ keys=await api('/admin/ssh-keys'); }catch(e){}
  const cur=$('s_key_sel').value;
  $('s_key_sel').innerHTML='<option value="">— 选择已保存的秘钥(或在下方粘贴)—</option>'
    + keys.map(k=>`<option value="${k.id}">${esc(k.name)}</option>`).join('');
  $('s_key_sel').value=cur;
}
async function saveServer(){
  const p=serverPayload();
  if(!p.name||!p.host||!p.username) return alert('名称/host/用户名 必填');
  if(editingServerId) await api('/admin/servers/'+editingServerId,'PUT',p);
  else await api('/admin/servers','POST',p);
  resetServerForm(); loadServers();
}
function resetServerForm(){
  editingServerId=null;
  ['s_name','s_host','s_user','s_pass','s_key','s_tags','s_desc'].forEach(id=>$(id).value='');
  $('s_port').value='22'; $('s_auth').value='password'; $('s_key_sel').value='';
  $('s_pass').placeholder='密码'; $('s_key').placeholder='私钥(auth=key 且未选已保存秘钥时填)';
  $('s_formTitle').textContent='新增服务器'; $('s_saveBtn').textContent='保存';
  $('s_cancelBtn').style.display='none'; $('s_editHint').style.display='none';
  onAuthChange();
}
async function editServer(id){
  const s=await api('/admin/servers/'+id);
  await loadKeyOptions();
  editingServerId=id;
  $('s_name').value=s.name; $('s_host').value=s.host; $('s_port').value=s.port;
  $('s_user').value=s.username; $('s_auth').value=s.auth_type;
  $('s_key_sel').value = s.ssh_key_id ? String(s.ssh_key_id) : '';
  $('s_tags').value=(s.tags||[]).join(','); $('s_desc').value=s.description||'';
  $('s_pass').value=''; $('s_key').value='';
  $('s_pass').placeholder = s.has_password ? '密码(留空保持不变)' : '密码';
  $('s_key').placeholder  = s.has_key ? '私钥(留空保持不变)' : '私钥(auth=key 且未选已保存秘钥时填)';
  $('s_formTitle').textContent='编辑服务器 #'+id; $('s_saveBtn').textContent='更新';
  $('s_cancelBtn').style.display='inline-block'; $('s_editHint').style.display='inline';
  onAuthChange();
  window.scrollTo(0,0);
}
async function testServer(id){
  const slot=$('test_'+id); slot.innerHTML=' <small>测试中…</small>';
  try{ const r=await api('/admin/servers/'+id+'/test','POST');
    slot.innerHTML=(r.ok?'✅ 连通':'❌ 失败')+'<pre>'+r.detail+'</pre>'; }
  catch(e){ slot.innerHTML=' <small>❌ 请求失败</small>'; }
}
async function loadServers(){ const l=await api('/admin/servers'); $('serverList').innerHTML=l.map(s=>
  `<div class="card"><b>${s.name}</b> · ${s.username}@${s.host}:${s.port} · ${s.auth_type} <small>${(s.tags||[]).join(',')}</small>
   <span style="float:right">
     <button class="btn ghost" onclick="testServer(${s.id})">测试连接</button>
     <button class="btn ghost" onclick="editServer(${s.id})">编辑</button>
     <button class="btn danger" onclick="if(confirm('删除 ${s.name}?'))api('/admin/servers/${s.id}','DELETE').then(loadServers)">删除</button>
   </span>
   <div id="test_${s.id}"></div></div>`).join(''); }

// ---- SSH 秘钥 ----
async function addSSHKey(){
  if(!$('k_name').value || !$('k_key').value) return alert('名称与私钥必填');
  await api('/admin/ssh-keys','POST',{name:$('k_name').value, private_key:$('k_key').value,
    passphrase:$('k_pass').value||null, description:$('k_desc').value||null});
  ['k_name','k_key','k_pass','k_desc'].forEach(id=>$(id).value='');
  loadSSHKeys(); loadKeyOptions();
}
async function loadSSHKeys(){ const l=await api('/admin/ssh-keys'); $('sshKeyList').innerHTML=l.map(k=>
  `<div class="card"><b>${esc(k.name)}</b> <small>${esc(k.description||'')}</small>
   <button class="btn danger" style="float:right" onclick="delSSHKey(${k.id},'${esc(k.name)}')">删除</button></div>`).join('')
   || '<small>暂无已保存的秘钥</small>'; }
async function delSSHKey(id,name){
  if(!confirm('删除秘钥 '+name+'?引用它的服务器会回退为未设置秘钥。')) return;
  await api('/admin/ssh-keys/'+id,'DELETE'); loadSSHKeys(); loadKeyOptions();
}

// ---- 云账号 ----
let editingCloudId = null;
function cloudPayload(){
  let secrets={}; try{ secrets=$('c_secrets').value?JSON.parse($('c_secrets').value):{}; }
  catch(e){ alert('认证 JSON 格式不合法'); throw e; }
  return {name:$('c_name').value, cloud_type:$('c_type').value, transport:$('c_transport').value,
    command:$('c_cmd').value||null, args:$('c_args').value.split(',').map(x=>x.trim()).filter(Boolean),
    url:$('c_url').value||null, enabled:$('c_enabled').checked, secrets};
}
async function saveCloud(){
  let p; try{ p=cloudPayload(); }catch(e){ return; }
  if(!p.name) return alert('名称必填');
  if(editingCloudId) await api('/admin/cloud-accounts/'+editingCloudId,'PUT',p);
  else await api('/admin/cloud-accounts','POST',p);
  resetCloudForm(); loadClouds();
}
function resetCloudForm(){
  editingCloudId=null;
  ['c_name','c_cmd','c_args','c_url','c_secrets'].forEach(id=>$(id).value='');
  $('c_type').value='aliyun'; $('c_transport').value='stdio'; $('c_enabled').checked=true;
  $('c_secrets').placeholder='认证信息 JSON,如 {"ALIBABA_CLOUD_ACCESS_KEY_ID":"xxx","ALIBABA_CLOUD_ACCESS_KEY_SECRET":"yyy"}';
  $('c_formTitle').textContent='新增云账号(MCP)'; $('c_saveBtn').textContent='保存';
  $('c_cancelBtn').style.display='none'; $('c_editHint').style.display='none';
}
async function editCloud(id){
  const a=await api('/admin/cloud-accounts/'+id);
  editingCloudId=id;
  $('c_name').value=a.name; $('c_type').value=a.cloud_type; $('c_transport').value=a.transport;
  $('c_cmd').value=a.command||''; $('c_args').value=(a.args||[]).join(','); $('c_url').value=a.url||'';
  $('c_enabled').checked=!!a.enabled; $('c_secrets').value='';
  $('c_secrets').placeholder = (a.secret_keys||[]).length
    ? '已有认证:'+a.secret_keys.join(', ')+'(留空保持不变,填新 JSON 则整体替换)'
    : '认证信息 JSON';
  $('c_formTitle').textContent='编辑云账号 #'+id; $('c_saveBtn').textContent='更新';
  $('c_cancelBtn').style.display='inline-block'; $('c_editHint').style.display='inline';
  window.scrollTo(0,0);
}
async function testCloud(id){
  const slot=$('ctest_'+id); slot.innerHTML=' <small>连接中…(stdio 首次会拉起 MCP 进程,可能较慢)</small>';
  try{ const r=await api('/admin/cloud-accounts/'+id+'/test','POST');
    slot.innerHTML = r.ok
      ? '✅ 可用,拉到 '+r.tool_count+' 个工具<pre>'+esc((r.tools||[]).join('\n'))+'</pre>'
      : '❌ 不可用<pre>'+esc(r.error)+'</pre>'
        +(r.traceback?'<details><summary>展开完整堆栈</summary><pre>'+esc(r.traceback)+'</pre></details>':'')
        +'<small>更多细节(含 MCP 子进程 stderr)见服务端日志 /tmp/ops_agent.log</small>'; }
  catch(e){ slot.innerHTML=' <small>❌ 请求失败</small>'; }
}
async function loadClouds(){ const l=await api('/admin/cloud-accounts'); $('cloudList').innerHTML=l.map(a=>
  `<div class="card"><b>${a.name}</b> · ${a.cloud_type} · ${a.transport} ${a.enabled?'✅':'⛔'} <small>keys: ${(a.secret_keys||[]).join(', ')}</small>
   <span style="float:right">
     <button class="btn ghost" onclick="testCloud(${a.id})">测试可用性</button>
     <button class="btn ghost" onclick="editCloud(${a.id})">编辑</button>
     <button class="btn danger" onclick="if(confirm('删除 ${a.name}?'))api('/admin/cloud-accounts/${a.id}','DELETE').then(loadClouds)">删除</button>
   </span>
   <div id="ctest_${a.id}"></div></div>`).join(''); }
